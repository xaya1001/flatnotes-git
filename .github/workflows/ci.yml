# .github/workflows/ci.yml

name: Continuous Integration

on:
  pull_request:
    branches:
      - git-integration

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Pipenv and Python dependencies
        run: |
          pip install pipenv
          pipenv install --dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # --- Test Step ---
      - name: Run Python and JS tests
        env:
          FLATNOTES_PATH: /tmp/flatnotes-test-data
          FLATNOTES_AUTH_TYPE: password
          FLATNOTES_USERNAME: testuser
          FLATNOTES_PASSWORD: testpassword
          FLATNOTES_SECRET_KEY: a-long-and-very-random-secret-key-for-ci
          FLATNOTES_GIT_ENABLED: true
        run: |
          mkdir -p $FLATNOTES_PATH
          npm run git-test
