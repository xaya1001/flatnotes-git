# .github/workflows/ci.yml

name: Continuous Integration

on:
  push:
    branches:
      - git-integration
  pull_request:
    branches:
      - git-integration

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Pipenv virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pipenv-

      - name: Install Pipenv and Python dependencies
        run: |
          pip install pipenv
          pipenv install --dev

      - name: Set up Node.js with npm caching
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run Python and JS tests
        env:
          # Environment variables for the test run
          FLATNOTES_PATH: /tmp/flatnotes-test-data
          FLATNOTES_AUTH_TYPE: password
          FLATNOTES_USERNAME: testuser
          FLATNOTES_PASSWORD: testpassword
          FLATNOTES_SECRET_KEY: a-long-and-very-random-secret-key-for-ci
          FLATNOTES_GIT_ENABLED: true
        run: |
          mkdir -p $FLATNOTES_PATH
          npm run git-test
