# .github/workflows/ci.yml

name: Continuous Integration

on:
  push:
    branches:
      - git-integration
  pull_request:
    branches:
      - git-integration

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Pipenv virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pipenv-

      - name: Install Pipenv and Python dependencies
        run: |
          pip install pipenv
          pipenv install --dev

      - name: Set up Node.js with npm caching
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Extract package version
        id: get_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Run Python and JS tests
        env:
          FLATNOTES_PATH: /tmp/flatnotes-test-data
          FLATNOTES_AUTH_TYPE: password
          FLATNOTES_USERNAME: testuser
          FLATNOTES_PASSWORD: testpassword
          FLATNOTES_SECRET_KEY: a-long-and-very-random-secret-key-for-ci
          FLATNOTES_GIT_ENABLED: true
        run: |
          mkdir -p $FLATNOTES_PATH
          npm run git-test

  tag-and-release:
    name: Create and Push Git Tag
    needs: test
    if: github.ref == 'refs/heads/git-integration'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate and Push New Tag
        run: |
          BASE_VERSION=${{ needs.test.outputs.version }}
          echo "Base version from package.json: $BASE_VERSION"

          TAG_PREFIX="v${BASE_VERSION}-git."

          LATEST_PATCH_NUM=$(git tag -l "${TAG_PREFIX}*" | sed "s/^${TAG_PREFIX}//" | sort -n | tail -n 1)

          if [ -z "$LATEST_PATCH_NUM" ]; then
            LATEST_PATCH_NUM=0
          fi
          
          NEXT_PATCH_NUM=$((LATEST_PATCH_NUM + 1))
          
          NEW_TAG="${TAG_PREFIX}${NEXT_PATCH_NUM}"
          
          echo "Creating new tag: ${NEW_TAG}"
          
          git tag -a "${NEW_TAG}" -m "Automatic release based on commit ${{ github.sha }}"
          
          git push origin "${NEW_TAG}"