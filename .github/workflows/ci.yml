# .github/workflows/ci.yml

name: Test and Deployment

on:
  push:
    branches:
      - git-integration
  pull_request:
    branches:
      - git-integration

jobs:
  ################################################
  # JOB 1: Build and Test
  ################################################
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Pipenv virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pipenv-

      - name: Install Pipenv and Python dependencies
        run: |
          pip install pipenv
          pipenv install --dev

      - name: Set up Node.js with npm caching
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Extract package version
        id: get_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Run Python and JS tests
        env:
          # Environment variables for the test run
          FLATNOTES_PATH: /tmp/flatnotes-test-data
          FLATNOTES_AUTH_TYPE: password
          FLATNOTES_USERNAME: testuser
          FLATNOTES_PASSWORD: testpassword
          FLATNOTES_SECRET_KEY: a-long-and-very-random-secret-key-for-ci
          FLATNOTES_GIT_ENABLED: true
        run: |
          mkdir -p $FLATNOTES_PATH
          npm run git-test

  ################################################
  # JOB 2: Create and Push Git Tag
  ################################################
  tag-and-release:
    name: Create and Push Git Tag
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/git-integration'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_step.outputs.new_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate and Push New Tag
        id: tag_step
        run: |
          BASE_VERSION=${{ needs.test.outputs.version }}
          echo "Base version from package.json: $BASE_VERSION"

          TAG_PREFIX="v${BASE_VERSION}-git."
          
          LATEST_PATCH_NUM=$(git tag -l "${TAG_PREFIX}*" | sed "s/^${TAG_PREFIX}//" | sort -n | tail -n 1)

          if [ -z "$LATEST_PATCH_NUM" ]; then
            LATEST_PATCH_NUM=0
          fi
          
          NEXT_PATCH_NUM=$((LATEST_PATCH_NUM + 1))
          
          NEW_TAG="${TAG_PREFIX}${NEXT_PATCH_NUM}"
          
          echo "Creating and pushing new tag: ${NEW_TAG}"
          git tag -a "${NEW_TAG}" -m "Automatic release based on commit ${{ github.sha }}"
          git push origin "${NEW_TAG}"
          
          # Output the new tag for the next job
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

  ################################################
  # JOB 3: Build and Push Docker Image
  ################################################
  build-and-push-docker:
    name: Build and Push Docker Image
    needs: tag-and-release
    # This job will always run if tag-and-release runs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/flatnotes-git

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.tag-and-release.outputs.new_tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/git-integration' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64